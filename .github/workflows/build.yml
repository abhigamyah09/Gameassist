name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Unzip Project
        run: unzip GameAssist_Final.zip

      - name: Make gradlew executable
        run: |
          cd GameAssist
          chmod +x gradlew

      - name: Build APK
        run: |
          cd GameAssist
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GameAssist-APK
          path: GameAssist/app/build/outputs/apk/debug/app-debug.apk
